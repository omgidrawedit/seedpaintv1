<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Seed Paint</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{background:#0a0a0a;color:#ccc;font-family:'Courier New',monospace;display:flex;height:100%;width:100%;overflow:hidden;position:fixed;top:0;left:0;user-select:none;-webkit-user-select:none}

#sidebar{width:170px;min-width:170px;background:#0f0f0f;border-right:1px solid #222;display:flex;flex-direction:column;overflow:hidden}
#mode-toggle{display:flex;border-bottom:1px solid #222;flex-shrink:0}
.mtab{flex:1;padding:9px 4px;background:transparent;border:none;color:#444;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;text-align:center;transition:all .15s}
.mtab.on{color:#7eb8a4;border-bottom:2px solid #7eb8a4;margin-bottom:-1px}
#sidebar-inner{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:11px 10px;display:flex;flex-direction:column;gap:10px}

.lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#444;margin-bottom:4px}
.rb{width:100%;padding:6px 9px;background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:11px;text-align:left;cursor:pointer;border-radius:2px;margin-bottom:3px;line-height:1.3}
.rb.on{border-color:#7eb8a4;color:#7eb8a4;background:#0a1410}
.rb .rn{font-size:11px;display:block}
.rb .rd{font-size:9px;color:#333;display:block;margin-top:1px}
.rb.on .rd{color:#3a6657}

.ctrl{display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.cr{display:flex;justify-content:space-between;font-size:10px;color:#444}
.cr span:last-child{color:#777}
input[type=range]{width:100%;height:3px;-webkit-appearance:none;appearance:none;background:#2a2a2a;border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#7eb8a4;cursor:pointer;border:none}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#7eb8a4;cursor:pointer;border:none}

hr{border:none;border-top:1px solid #1a1a1a;flex-shrink:0}
.btn{width:100%;padding:6px;background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:10px;cursor:pointer;border-radius:2px;margin-bottom:3px;letter-spacing:.05em;text-align:left}
.btn:active{background:#1a1a1a}
.btn.rec{border-color:#7a2a2a;color:#7a2a2a}
.btn.rec.on{background:#7a2a2a;color:#fff;animation:blink 1s infinite}
.btn.mp4c{border-color:#2a5a7a;color:#2a5a7a}
.btn.mp4c.on{background:#2a5a7a;color:#fff;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}

.swatches{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.sw.on{border-color:#fff}

/* cycling pen palette builder */
#cyc-palette{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;min-height:24px}
.cyc-sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;position:relative;flex-shrink:0}
.cyc-sw.on{border-color:#fff}
.cyc-sw .rm{display:none;position:absolute;top:-4px;right:-4px;width:10px;height:10px;background:#c0392b;border-radius:50%;font-size:7px;color:#fff;align-items:center;justify-content:center}
.cyc-sw:hover .rm{display:flex}
.add-cyc{width:20px;height:20px;border-radius:50%;border:1px dashed #333;background:transparent;cursor:pointer;font-size:14px;color:#444;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-cyc:hover{border-color:#666;color:#888}
#cyc-hue-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
#cyc-hue-preview{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:1px solid #333}

/* size modal */
#size-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center}
#size-modal.show{display:flex}
.mbox{background:#1a1a1a;border:1px solid #333;padding:18px;border-radius:4px;width:250px}
.mbox h3{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#555;margin-bottom:12px}
.mbox input[type=number]{width:100%;padding:7px;background:#111;border:1px solid #333;color:#ccc;font-family:'Courier New',monospace;font-size:13px;border-radius:2px;margin-bottom:7px}
.mbox input[type=number]:focus{outline:none;border-color:#7eb8a4}
.prow{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.preset{padding:4px 7px;background:transparent;border:1px solid #333;color:#555;font-family:'Courier New',monospace;font-size:9px;cursor:pointer;border-radius:2px}
.preset:hover{border-color:#555;color:#999}
.mact{display:flex;gap:7px;margin-top:3px}
.mact button{flex:1;padding:7px;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;border-radius:2px}
.mok{background:#7eb8a4;border:none;color:#0a1410}
.mcancel{background:transparent;border:1px solid #333;color:#555}

#canvas-wrap{flex:1;position:relative;overflow:hidden;touch-action:none;display:flex;align-items:center;justify-content:center;background:#111}
#c{touch-action:none;display:block}
#info{position:absolute;bottom:8px;right:10px;font-size:9px;color:#2a2a2a;pointer-events:none}
</style>
</head>
<body>

<div id="sidebar">
  <div id="mode-toggle">
    <button class="mtab on" id="tab-classic">classic</button>
    <button class="mtab" id="tab-auto">automaton</button>
  </div>
  <div id="sidebar-inner">

    <!-- CLASSIC PANEL -->
    <div id="panel-classic">
      <div>
        <div class="lbl">brush</div>
        <button class="rb on" data-brush="pen"><span class="rn">solid pen</span><span class="rd">hard edge, pressure = size</span></button>
        <button class="rb" data-brush="texture"><span class="rn">textured</span><span class="rd">rough bristly edge</span></button>
        <button class="rb" data-brush="marker"><span class="rn">flat marker</span><span class="rd">wide, transparent</span></button>
        <button class="rb" data-brush="cycle"><span class="rn">cycle pen</span><span class="rd">random colour each stroke</span></button>
        <button class="rb" data-brush="eraser"><span class="rn">eraser</span><span class="rd">clears to background</span></button>
      </div>
      <hr>
      <div>
        <div class="lbl">colour</div>
        <div class="swatches" id="classic-swatches"></div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
          <input type="color" id="classic-color-pick" value="#e8c97a" style="width:22px;height:22px;border-radius:50%;border:1px solid #333;padding:0;cursor:pointer;background:none">
          <span style="font-size:9px;color:#444">custom</span>
        </div>
      </div>
      <hr>
      <!-- cycling pen palette builder -->
      <div id="cyc-section">
        <div class="lbl">cycle palette</div>
        <div id="cyc-palette"></div>
        <div id="cyc-hue-row">
          <input type="range" id="cyc-hue" min="0" max="360" value="200" step="1" style="flex:1">
          <div id="cyc-hue-preview"></div>
          <button class="add-cyc" id="cyc-add">+</button>
        </div>
      </div>
      <hr>
      <div>
        <div class="lbl">size</div>
        <div class="ctrl">
          <div class="cr"><span>size</span><span id="classic-size-val">12</span></div>
          <input type="range" id="classic-size" min="1" max="80" value="12" step="1">
        </div>
        <div class="ctrl">
          <div class="cr"><span>opacity</span><span id="classic-opacity-val">90</span></div>
          <input type="range" id="classic-opacity" min="5" max="100" value="90" step="1">
        </div>
      </div>
    </div>

    <!-- AUTOMATON PANEL -->
    <div id="panel-auto" style="display:none">
      <div>
        <div class="lbl">rule</div>
        <button class="rb on" data-rule="crystal"><span class="rn">crystal</span><span class="rd">grows outward, stays</span></button>
        <button class="rb" data-rule="pulse"><span class="rn">pulse</span><span class="rd">waves radiate outward</span></button>
        <button class="rb" data-rule="coral"><span class="rn">coral</span><span class="rd">branches, seeks edges</span></button>
        <button class="rb" data-rule="infection"><span class="rn">infection</span><span class="rd">colours fight each other</span></button>
        <button class="rb" data-rule="noise"><span class="rn">noise field</span><span class="rd">marks drift + warp</span></button>
        <button class="rb" data-rule="static"><span class="rn">static</span><span class="rd">grain that organises</span></button>
      </div>
      <hr>
      <div>
        <div class="lbl">colour</div>
        <div class="swatches" id="auto-swatches"></div>
      </div>
      <hr>
      <div>
        <div class="lbl">seed</div>
        <div class="ctrl">
          <div class="cr"><span>density</span><span id="dv">60</span></div>
          <input type="range" id="density" min="10" max="100" value="60" step="1">
        </div>
        <div class="ctrl">
          <div class="cr"><span>speed</span><span id="sv">5</span></div>
          <input type="range" id="speed" min="1" max="10" value="5" step="1">
        </div>
        <div class="ctrl">
          <div class="cr"><span>hue drift</span><span id="hdv">30</span></div>
          <input type="range" id="hdrift" min="0" max="120" value="30" step="1">
        </div>
      </div>
    </div>

    <!-- SHARED BOTTOM -->
    <hr>
    <div>
      <div class="lbl">canvas</div>
      <button class="btn" id="size-btn">set size</button>
      <button class="btn" id="clear-btn">clear</button>
      <button class="btn" id="pause-btn">pause</button>
    </div>
    <hr>
    <div>
      <div class="lbl">export</div>
      <button class="btn rec" id="gif-btn">● gif</button>
      <button class="btn mp4c" id="mp4-btn">● mp4</button>
      <button class="btn" id="png-btn">png</button>
    </div>

  </div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="info">seed paint</div>
</div>

<div id="size-modal">
  <div class="mbox">
    <h3>canvas size</h3>
    <div class="prow">
      <button class="preset" data-w="800" data-h="800">800²</button>
      <button class="preset" data-w="1080" data-h="1080">1080²</button>
      <button class="preset" data-w="1920" data-h="1080">1920×1080</button>
      <button class="preset" data-w="1080" data-h="1920">1080×1920</button>
      <button class="preset" data-w="2048" data-h="2048">2048²</button>
    </div>
    <input type="number" id="cw" placeholder="width px" value="1080">
    <input type="number" id="ch" placeholder="height px" value="1080">
    <div class="mact">
      <button class="mcancel" id="modal-cancel">cancel</button>
      <button class="mok" id="modal-ok">apply</button>
    </div>
  </div>
</div>

<script>
// ── COLOUR HELPERS ────────────────────────────────────────────────
function hslToRgb(h,s,l){
  h=((h%360)+360)%360;s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1)};
  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}
function hslToHex(h,s,l){const[r,g,b]=hslToRgb(h,s,l);return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b]}

// ── SWATCHES SETUP ────────────────────────────────────────────────
const AUTO_PALETTE=[{h:160},{h:200},{h:280},{h:340},{h:20},{h:50},{h:0},{h:120}];
let autoActiveColor=0;

function buildAutoSwatches(){
  const c=document.getElementById('auto-swatches');c.innerHTML='';
  AUTO_PALETTE.forEach((p,i)=>{
    const sw=document.createElement('div');
    sw.className='sw'+(i===0?' on':'');
    const[r,g,b]=hslToRgb(p.h,65,45);
    sw.style.background=`rgb(${r},${g},${b})`;
    sw.addEventListener('click',()=>{
      c.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
      sw.classList.add('on');autoActiveColor=i;
    });
    c.appendChild(sw);
  });
}
buildAutoSwatches();

const CLASSIC_COLORS=['#e8c97a','#e87a7a','#7ae8b8','#7ab4e8','#c87ae8','#e8e8e8','#888','#333'];
let classicColor='#e8c97a';

function buildClassicSwatches(){
  const c=document.getElementById('classic-swatches');c.innerHTML='';
  CLASSIC_COLORS.forEach((col,i)=>{
    const sw=document.createElement('div');
    sw.className='sw'+(i===0?' on':'');
    sw.style.background=col;
    sw.addEventListener('click',()=>{
      c.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
      sw.classList.add('on');classicColor=col;
      document.getElementById('classic-color-pick').value=col;
    });
    c.appendChild(sw);
  });
}
buildClassicSwatches();

document.getElementById('classic-color-pick').addEventListener('input',e=>{
  classicColor=e.target.value;
  document.querySelectorAll('#classic-swatches .sw').forEach(s=>s.classList.remove('on'));
});

// ── CYCLE PEN PALETTE ─────────────────────────────────────────────
let cyclePalette=[];
const cycHueSlider=document.getElementById('cyc-hue');
const cycHuePreview=document.getElementById('cyc-hue-preview');

function updateCycPreview(){
  const h=+cycHueSlider.value;
  cycHuePreview.style.background=hslToHex(h,65,50);
}
cycHueSlider.addEventListener('input',updateCycPreview);
updateCycPreview();

function buildCycPalette(){
  const c=document.getElementById('cyc-palette');c.innerHTML='';
  cyclePalette.forEach((hex,i)=>{
    const sw=document.createElement('div');sw.className='cyc-sw';
    sw.style.background=hex;
    const rm=document.createElement('div');rm.className='rm';rm.textContent='×';
    rm.addEventListener('click',e=>{e.stopPropagation();cyclePalette.splice(i,1);buildCycPalette()});
    sw.appendChild(rm);c.appendChild(sw);
  });
}

document.getElementById('cyc-add').addEventListener('click',()=>{
  const h=+cycHueSlider.value;
  cyclePalette.push(hslToHex(h,65,50));
  buildCycPalette();
});

// seed with a few defaults
[160,280,20,340,50].forEach(h=>cyclePalette.push(hslToHex(h,65,50)));
buildCycPalette();

let cycCurrentColor=cyclePalette[0]||'#7eb8a4';
function pickCycColor(){
  if(cyclePalette.length===0)return classicColor;
  cycCurrentColor=cyclePalette[Math.floor(Math.random()*cyclePalette.length)];
  return cycCurrentColor;
}

// ── MODE TOGGLE ───────────────────────────────────────────────────
let mode='classic'; // 'classic' | 'auto'
document.getElementById('tab-classic').addEventListener('click',()=>{
  mode='classic';
  document.getElementById('tab-classic').classList.add('on');
  document.getElementById('tab-auto').classList.remove('on');
  document.getElementById('panel-classic').style.display='';
  document.getElementById('panel-auto').style.display='none';
});
document.getElementById('tab-auto').addEventListener('click',()=>{
  mode='auto';
  document.getElementById('tab-auto').classList.add('on');
  document.getElementById('tab-classic').classList.remove('on');
  document.getElementById('panel-auto').style.display='';
  document.getElementById('panel-classic').style.display='none';
});

// ── CANVAS + CONTEXTS ─────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
// second canvas for automaton pixel grid
const autoCanvas=document.createElement('canvas');
const autoCtx=autoCanvas.getContext('2d');
const wrap=document.getElementById('canvas-wrap');

const CELL=4;
let CW=1080,CH=1080,COLS,ROWS;
let grid,nextGrid,hueGrid,nextHueGrid,ageGrid,ruleGrid,phaseGrid;

const RULE_NONE=0,RULE_CRYSTAL=1,RULE_PULSE=2,RULE_CORAL=3,
      RULE_INFECTION=4,RULE_NOISE=5,RULE_STATIC=6;
const RULE_IDS={crystal:RULE_CRYSTAL,pulse:RULE_PULSE,coral:RULE_CORAL,
                infection:RULE_INFECTION,noise:RULE_NOISE,static:RULE_STATIC};

function initGrids(w,h){
  CW=w;CH=h;
  canvas.width=CW;canvas.height=CH;
  canvas.style.maxWidth='100%';canvas.style.maxHeight='100%';
  autoCanvas.width=CW;autoCanvas.height=CH;
  COLS=Math.ceil(CW/CELL);ROWS=Math.ceil(CH/CELL);
  const n=COLS*ROWS;
  grid=new Float32Array(n);nextGrid=new Float32Array(n);
  hueGrid=new Float32Array(n);nextHueGrid=new Float32Array(n);
  ageGrid=new Float32Array(n);ruleGrid=new Uint8Array(n);phaseGrid=new Float32Array(n);
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,CW,CH);
  autoCtx.clearRect(0,0,CW,CH);
}
initGrids(1080,1080);

// ── STATE ─────────────────────────────────────────────────────────
let currentBrush='pen',currentRule='crystal';
let density=60,simSpeed=5,hueDrift=30;
let classicSize=12,classicOpacity=90;
let paused=false,drawing=false,lastCX=-1,lastCY=-1,lastPX=-1,lastPY=-1,pressure=0.5;
let noiseT=0;
let strokeCycColor=cyclePalette[0];

// ── CLASSIC BRUSH DRAWING ─────────────────────────────────────────
function drawClassicPoint(x,y,p){
  const brush=currentBrush;
  const alpha=(classicOpacity/100)*(0.4+p*0.6);
  const size=classicSize*(0.5+p*0.5);

  if(brush==='eraser'){
    ctx.save();
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();ctx.arc(x,y,size*1.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // also clear automaton cells under eraser
    const cx=Math.floor(x/CELL),cy=Math.floor(y/CELL);
    const r=Math.ceil(size*1.5/CELL);
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
      const nx=cx+dx,ny=cy+dy;
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
      if(dx*dx+dy*dy<=r*r){const i=ny*COLS+nx;grid[i]=0;ruleGrid[i]=0}
    }
    return;
  }

  const col=brush==='cycle'?strokeCycColor:classicColor;
  const[r,g,b]=hexToRgb(col);
  ctx.save();

  if(brush==='pen'){
    ctx.globalAlpha=alpha;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill();
  }

  if(brush==='texture'){
    // scatter dots around the point for bristle effect
    const count=Math.floor(8+p*14);
    for(let i=0;i<count;i++){
      const angle=Math.random()*Math.PI*2;
      const dist=Math.random()*size*1.2;
      const tx=x+Math.cos(angle)*dist,ty=y+Math.sin(angle)*dist;
      const dotSize=size*(0.12+Math.random()*0.2);
      ctx.globalAlpha=alpha*(0.3+Math.random()*0.7);
      ctx.fillStyle=col;
      ctx.beginPath();ctx.arc(tx,ty,dotSize,0,Math.PI*2);ctx.fill();
    }
    // central dot
    ctx.globalAlpha=alpha*0.8;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(x,y,size*0.4,0,Math.PI*2);ctx.fill();
  }

  if(brush==='marker'){
    ctx.globalAlpha=alpha*0.35;
    ctx.fillStyle=col;
    ctx.beginPath();
    // wide flat ellipse
    ctx.ellipse(x,y,size*2.2,size*0.7,Math.PI/6,0,Math.PI*2);
    ctx.fill();
  }

  if(brush==='cycle'){
    ctx.globalAlpha=alpha;
    ctx.fillStyle=strokeCycColor;
    ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill();
  }

  ctx.restore();
}

function interpolateClassic(x1,y1,x2,y2,p){
  const dist=Math.hypot(x2-x1,y2-y1);
  const step=Math.max(1,classicSize*0.4);
  const steps=Math.ceil(dist/step);
  for(let i=1;i<=steps;i++){
    const t=i/steps;
    drawClassicPoint(x1+(x2-x1)*t,y1+(y2-y1)*t,p);
  }
}

// ── AUTOMATON SEED ────────────────────────────────────────────────
function idx(x,y){x=(x+COLS)%COLS;y=(y+ROWS)%ROWS;return y*COLS+x}

function seedAt(cx,cy,p){
  const r=Math.max(2,Math.floor((density/100)*8*p));
  const col=AUTO_PALETTE[autoActiveColor];
  const ruleId=RULE_IDS[currentRule]||RULE_CRYSTAL;
  for(let dy=-r;dy<=r;dy++){
    for(let dx=-r;dx<=r;dx++){
      if(dx*dx+dy*dy>r*r)continue;
      const x=cx+dx,y=cy+dy;
      if(x<0||x>=COLS||y<0||y>=ROWS)continue;
      if(Math.random()<(density/100)*p){
        const i=idx(x,y);
        grid[i]=0.8+Math.random()*0.2;ageGrid[i]=0;
        hueGrid[i]=col.h+(Math.random()-0.5)*hueDrift;
        ruleGrid[i]=ruleId;phaseGrid[i]=0;
      }
    }
  }
}

function smoothNoise(x,y,t){
  return Math.sin(x*0.08+t*0.7)*Math.cos(y*0.06+t*0.5)
       + Math.sin(x*0.03-y*0.04+t*0.3)*0.5;
}

// ── AUTOMATON STEP ────────────────────────────────────────────────
function step(){
  nextGrid.set(grid);nextHueGrid.set(hueGrid);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const i=idx(x,y);const v=grid[i];const rule=ruleGrid[i];

      if(rule===RULE_CRYSTAL){
        ageGrid[i]++;nextGrid[i]=v;
        for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
          if(!dx&&!dy)continue;
          const nx=x+dx,ny=y+dy;
          if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
          const ni=idx(nx,ny);
          if(grid[ni]<0.15&&Math.random()<0.035){
            let nc=0;
            for(let dy2=-1;dy2<=1;dy2++)for(let dx2=-1;dx2<=1;dx2++){
              if(!dx2&&!dy2)continue;
              if(grid[idx(nx+dx2,ny+dy2)]>0.15)nc++;
            }
            if(nc>=2&&nc<=5){
              nextGrid[ni]=v*(0.88+Math.random()*0.12);
              nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*8;
              ruleGrid[ni]=RULE_CRYSTAL;ageGrid[ni]=0;
            }
          }
        }
        continue;
      }

      if(rule===RULE_PULSE){
        ageGrid[i]++;phaseGrid[i]+=0.18;
        nextGrid[i]=0.25+(Math.sin(phaseGrid[i])*.5+.5)*0.75;
        if(ageGrid[i]%4===0&&Math.random()<0.06){
          for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
            if(!dx&&!dy)continue;
            const nx=x+dx,ny=y+dy;
            if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
            const ni=idx(nx,ny);
            if(grid[ni]<0.1){
              nextGrid[ni]=0.6+Math.random()*0.3;
              nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*15;
              ruleGrid[ni]=RULE_PULSE;
              phaseGrid[ni]=phaseGrid[i]+Math.PI*(0.8+Math.random()*0.4);
              ageGrid[ni]=0;
            }
          }
        }
        continue;
      }

      if(rule===RULE_CORAL){
        ageGrid[i]++;nextGrid[i]=v;
        for(const[dx,dy]of[[0,-1],[1,0],[0,1],[-1,0]]){
          const nx=x+dx,ny=y+dy;
          if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
          const ni=idx(nx,ny);if(grid[ni]>0.1)continue;
          let liveN=0;
          for(const[dx2,dy2]of[[0,-1],[1,0],[0,1],[-1,0]])if(grid[idx(nx+dx2,ny+dy2)]>0.1)liveN++;
          let dc=0;
          for(const[dx2,dy2]of[[-1,-1],[1,-1],[-1,1],[1,1]])if(grid[idx(nx+dx2,ny+dy2)]>0.1)dc++;
          if(liveN===1&&dc===0&&Math.random()<0.05){
            nextGrid[ni]=v*(0.88+Math.random()*0.12);
            nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*12;
            ruleGrid[ni]=RULE_CORAL;ageGrid[ni]=0;
          }
        }
        continue;
      }

      if(rule===RULE_INFECTION){
        ageGrid[i]++;nextGrid[i]=v;
        for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
          if(!dx&&!dy)continue;
          const nx=x+dx,ny=y+dy;
          if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
          const ni=idx(nx,ny);const nv=grid[ni];
          if(nv<0.05){
            if(Math.random()<0.018){nextGrid[ni]=v*0.85;nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*8;ruleGrid[ni]=RULE_INFECTION;ageGrid[ni]=0}
          } else {
            const hd=Math.abs(hueGrid[ni]-hueGrid[i]);
            if(Math.min(hd,360-hd)>35&&Math.random()<0.014&&v>=nv){
              nextGrid[ni]=v*0.9;nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*10;ruleGrid[ni]=RULE_INFECTION;ageGrid[ni]=0;
            }
          }
        }
        continue;
      }

      if(rule===RULE_NOISE&&v>0.01){
        ageGrid[i]++;
        const angle=(smoothNoise(x,y,noiseT)+1)*Math.PI;
        const tx=Math.round(x+Math.cos(angle)*0.9),ty=Math.round(y+Math.sin(angle)*0.9);
        if(tx>=0&&tx<COLS&&ty>=0&&ty<ROWS){
          const ti=idx(tx,ty);
          nextGrid[ti]=Math.min(1,v*0.992+nextGrid[ti]);
          nextHueGrid[ti]=hueGrid[i]+(Math.random()-0.5)*3;
          ruleGrid[ti]=RULE_NOISE;ageGrid[ti]=ageGrid[i]+1;
        }
        nextGrid[i]=Math.max(0,v-0.04);
        if(nextGrid[i]<0.04)ruleGrid[i]=RULE_NONE;
        continue;
      }

      if(rule===RULE_STATIC){
        ageGrid[i]++;nextGrid[i]=v;
        let hsum=0,hcount=0;
        for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
          if(!dx&&!dy)continue;
          const ni=idx(x+dx,y+dy);
          if(grid[ni]>0.05){hsum+=hueGrid[ni];hcount++}
        }
        if(hcount>0)nextHueGrid[i]=hueGrid[i]+(hsum/hcount-hueGrid[i])*0.05;
        if(Math.random()<0.25)nextGrid[i]=Math.max(0.15,Math.min(1,v+(Math.random()-0.5)*0.12));
        if(v>0.3&&Math.random()<0.012){
          const dx=Math.floor(Math.random()*3)-1,dy=Math.floor(Math.random()*3)-1;
          const ni=idx(x+dx,y+dy);
          if(grid[ni]<0.08){nextGrid[ni]=v*(0.5+Math.random()*0.3);nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*hueDrift;ruleGrid[ni]=RULE_STATIC;ageGrid[ni]=0}
        }
        continue;
      }
    }
  }

  noiseT+=0.012;
  grid.set(nextGrid);hueGrid.set(nextHueGrid);
}

// ── AUTOMATON RENDER (onto autoCanvas, then composite onto main) ──
function renderAuto(){
  const imgData=autoCtx.createImageData(CW,CH);
  const data=imgData.data;
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const i=idx(x,y);const v=grid[i];
    if(v<0.02)continue;
    const rule=ruleGrid[i];
    let s=60+v*25,l=20+v*52;
    if(rule===RULE_PULSE){s=70;l=15+v*65}
    if(rule===RULE_STATIC){s=45+v*20;l=18+v*40}
    const[r,g,b]=hslToRgb(hueGrid[i],s,l);
    const alpha=Math.min(255,Math.floor(v*255));
    for(let py=0;py<CELL;py++)for(let px=0;px<CELL;px++){
      const px2=x*CELL+px,py2=y*CELL+py;
      if(px2>=CW||py2>=CH)continue;
      const pi=(py2*CW+px2)*4;
      data[pi]=r;data[pi+1]=g;data[pi+2]=b;data[pi+3]=alpha;
    }
  }
  autoCtx.clearRect(0,0,CW,CH);
  autoCtx.putImageData(imgData,0,0);
}

// ── MAIN RENDER: composite auto layer on top of classic layer ─────
function renderComposite(){
  renderAuto();
  ctx.save();
  ctx.globalCompositeOperation='source-over';
  ctx.drawImage(autoCanvas,0,0);
  ctx.restore();
}

// ── LOOP ─────────────────────────────────────────────────────────
// Classic drawing goes directly to ctx (persistent).
// Auto layer is redrawn each frame on top.
// We keep a "base" snapshot of just the classic painting.
let baseCanvas=document.createElement('canvas');
let baseCtx=baseCanvas.getContext('2d');

function syncBase(){
  baseCanvas.width=CW;baseCanvas.height=CH;
  baseCtx.drawImage(canvas,0,0);
}
syncBase();

let stepAccum=0,lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(!paused){
    const dt=Math.min(50,ts-lastTime);lastTime=ts;
    stepAccum+=dt;
    const interval=1000/(simSpeed*8);
    while(stepAccum>interval){step();stepAccum-=interval}
  }
  // restore base (classic) layer then composite auto on top
  ctx.clearRect(0,0,CW,CH);
  ctx.drawImage(baseCanvas,0,0);
  renderAuto();
  ctx.save();ctx.globalCompositeOperation='source-over';
  ctx.drawImage(autoCanvas,0,0);
  ctx.restore();
  if(gifRecording)captureGifFrame(ts-lastTime||16);
}
requestAnimationFrame(loop);

// ── INPUT ─────────────────────────────────────────────────────────
function clientToCanvas(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  const scaleX=CW/rect.width,scaleY=CH/rect.height;
  return[(clientX-rect.left)*scaleX,(clientY-rect.top)*scaleY];
}
function getCell(px,py){return[Math.floor(px/CELL),Math.floor(py/CELL)]}

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();canvas.setPointerCapture(e.pointerId);
  drawing=true;pressure=e.pressure>0?e.pressure:0.5;
  const[px,py]=clientToCanvas(e.clientX,e.clientY);
  lastPX=px;lastPY=py;
  if(mode==='classic'){
    if(currentBrush==='cycle')strokeCycColor=pickCycColor();
    drawClassicPoint(px,py,pressure);
    syncBase();
  } else {
    const[cx,cy]=getCell(px,py);
    lastCX=cx;lastCY=cy;seedAt(cx,cy,pressure);
  }
},{passive:false});

canvas.addEventListener('pointermove',e=>{
  e.preventDefault();if(!drawing)return;
  pressure=e.pressure>0?e.pressure:pressure;
  const[px,py]=clientToCanvas(e.clientX,e.clientY);
  if(mode==='classic'){
    interpolateClassic(lastPX,lastPY,px,py,pressure);
    syncBase();
  } else {
    const[cx,cy]=getCell(px,py);
    const[lcx,lcy]=getCell(lastPX,lastPY);
    if(cx===lcx&&cy===lcy){lastPX=px;lastPY=py;return}
    const steps=Math.max(1,Math.ceil(Math.hypot(cx-lcx,cy-lcy)));
    for(let i=0;i<=steps;i++){
      const ix=Math.round(lcx+(cx-lcx)*i/steps);
      const iy=Math.round(lcy+(cy-lcy)*i/steps);
      seedAt(ix,iy,pressure*0.7);
    }
  }
  lastPX=px;lastPY=py;
},{passive:false});

canvas.addEventListener('pointerup',e=>{e.preventDefault();drawing=false;},{passive:false});
canvas.addEventListener('pointercancel',()=>{drawing=false});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

function sl(id,vid,fn){

  const u=()=>{fn(+el.value);if(vl)vl.textContent=el.value};
  el.addEventListener('input',u);el.addEventListener('change',u);
}
sl('density','dv',v=>density=v);
sl('speed','sv',v=>simSpeed=v);
sl('hdrift','hdv',v=>hueDrift=v);
sl('classic-size','classic-size-val',v=>classicSize=v);
sl('classic-opacity','classic-opacity-val',v=>classicOpacity=v);

document.getElementById('clear-btn').addEventListener('click',()=>{
  grid.fill(0);nextGrid.fill(0);hueGrid.fill(0);nextHueGrid.fill(0);
  ageGrid.fill(0);ruleGrid.fill(0);phaseGrid.fill(0);

// ── GIF ENCODER ───────────────────────────────────────────────────
function encodeGif(frames,w,h,delay){
  function quantize(rgba){
    const palette=[];
    for(let r=0;r<6;r++)for(let g=0;g<6;g++)for(let b=0;b<6;b++)palette.push([r*51,g*51,b*51]);
    while(palette.length<256)palette.push([0,0,0]);
    const indices=new Uint8Array(w*h);
    for(let i=0;i<w*h;i++){
      indices[i]=Math.round(rgba[i*4]/51)*36+Math.round(rgba[i*4+1]/51)*6+Math.round(rgba[i*4+2]/51);
    }
    return{palette,indices};
  }
  function lzwEncode(indices,minCode){
    const clear=1<<minCode,eoi=clear+1;
    const table=new Map();let codeSize=minCode+1,nextCode=eoi+1;
    const out=[];let buf=0,bufBits=0;
    function emit(code){buf|=code<<bufBits;bufBits+=codeSize;while(bufBits>=8){out.push(buf&0xff);buf>>=8;bufBits-=8}}
    emit(clear);let str=null;
    for(let i=0;i<indices.length;i++){
      const c=indices[i];if(str===null){str=c;continue}
      const key=str+','+c;
      if(table.has(key)){str=table.get(key)}
      else{
        emit(str);
        if(nextCode<4096){table.set(key,nextCode++);if(nextCode>(1<<codeSize)&&codeSize<12)codeSize++}
        else{emit(clear);table.clear();codeSize=minCode+1;nextCode=eoi+1}
        str=c;
      }
    }
    if(str!==null)emit(str);emit(eoi);if(bufBits>0)out.push(buf&0xff);
    return new Uint8Array(out);
  }
  const bytes=[];
  const wb=b=>bytes.push(b&0xff);
  const ws=s=>{for(let i=0;i<s.length;i++)wb(s.charCodeAt(i))};
  const ww=n=>{wb(n&0xff);wb((n>>8)&0xff)};
  ws('GIF89a');ww(w);ww(h);wb(0xF7);wb(0);wb(0);
  const{palette:gpal}=quantize(frames[0]);
  for(const[r,g,b]of gpal){wb(r);wb(g);wb(b)}
  ws('\x21\xFF\x0B');ws('NETSCAPE2.0');wb(3);wb(1);ww(0);wb(0);
  for(const rgba of frames){
    const{indices}=quantize(rgba);
    ws('\x21\xF9\x04');wb(0);ww(delay);wb(0);wb(0);
    wb(0x2C);ww(0);ww(0);ww(w);ww(h);wb(0);
    const minCode=8;wb(minCode);
    const lzw=lzwEncode(indices,minCode);
    let off=0;
    while(off<lzw.length){const len=Math.min(255,lzw.length-off);wb(len);for(let i=0;i<len;i++)wb(lzw[off+i]);off+=len}
    wb(0);
  }
  wb(0x3B);return new Uint8Array(bytes);
}

let gifRecording=false,gifFrames=[],gifTimer=0;
const gifBtn=document.getElementById('gif-btn');
function captureGifFrame(dt){
  gifTimer+=dt;
  if(gifTimer>130){
    gifTimer=0;
    const scale=Math.min(1,400/Math.max(CW,CH));
    const gw=Math.round(CW*scale),gh=Math.round(CH*scale);
    const off=document.createElement('canvas');off.width=gw;off.height=gh;
    const oc=off.getContext('2d');oc.drawImage(canvas,0,0,gw,gh);
    gifFrames.push({data:oc.getImageData(0,0,gw,gh).data.slice(),w:gw,h:gh});
    if(gifFrames.length>60)gifFrames.shift();
  }
}
gifBtn.addEventListener('click',()=>{
  if(!gifRecording){
    gifRecording=true;gifFrames=[];gifTimer=0;
    gifBtn.textContent='■ stop gif';gifBtn.classList.add('on');
  }else{
    gifRecording=false;gifBtn.textContent='● gif';gifBtn.classList.remove('on');
    if(gifFrames.length<3){alert('not enough frames');return}
    gifBtn.textContent='encoding...';gifBtn.disabled=true;
    setTimeout(()=>{
      try{
        const{w,h}=gifFrames[0];
        const st=Math.max(1,Math.floor(gifFrames.length/30));
        const chosen=gifFrames.filter((_,i)=>i%st===0).slice(0,30);
        const gif=encodeGif(chosen.map(f=>f.data),w,h,13);
        const blob=new Blob([gif],{type:'image/gif'});
        const a=document.createElement('a');a.download='seed-paint-'+Date.now()+'.gif';
        a.href=URL.createObjectURL(blob);a.click();
      }catch(e){alert('gif failed: '+e.message)}
      gifBtn.textContent='● gif';gifBtn.disabled=false;
    },50);
  }
});

let mp4Recording=false,mediaRecorder=null,mp4Chunks=[];
const mp4Btn=document.getElementById('mp4-btn');
mp4Btn.addEventListener('click',()=>{
  if(!mp4Recording){
    const stream=canvas.captureStream(24);
    const mime=['video/mp4;codecs=avc1','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']
      .find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    try{mediaRecorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:4000000})}
    catch(e){mediaRecorder=new MediaRecorder(stream)}
    mp4Chunks=[];
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)mp4Chunks.push(e.data)};
    mediaRecorder.onstop=()=>{
      const m=mediaRecorder.mimeType||'video/webm';
      const blob=new Blob(mp4Chunks,{type:m});
      const a=document.createElement('a');
      a.download='seed-paint-'+Date.now()+'.'+(m.includes('mp4')?'mp4':'webm');
      a.href=URL.createObjectURL(blob);a.click();
      mp4Btn.textContent='● mp4';mp4Btn.classList.remove('on');
    };
    mediaRecorder.start(100);mp4Recording=true;
    mp4Btn.textContent='■ stop mp4';mp4Btn.classList.add('on');
  }else{mp4Recording=false;mediaRecorder.stop()}
});
