<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Seed Paint</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{background:#0a0a0a;color:#ccc;font-family:'Courier New',monospace;display:flex;height:100%;width:100%;overflow:hidden;position:fixed;top:0;left:0;user-select:none;-webkit-user-select:none}
#sidebar{width:180px;min-width:180px;background:#0f0f0f;border-right:1px solid #222;display:flex;flex-direction:column;overflow:hidden}
#mode-toggle{display:flex;border-bottom:1px solid #222;flex-shrink:0}
.mtab{flex:1;padding:10px 2px;background:transparent;border:none;color:#444;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;text-align:center}
.mtab.on{color:#7eb8a4;border-bottom:2px solid #7eb8a4;margin-bottom:-1px}
#sidebar-inner{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:11px 10px;display:flex;flex-direction:column;gap:10px}
.lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#444;margin-bottom:5px}
.rb{width:100%;padding:8px 9px;background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:11px;text-align:left;cursor:pointer;border-radius:2px;margin-bottom:4px;line-height:1.3}
.rb.on{border-color:#7eb8a4;color:#7eb8a4;background:#0a1410}
.rb .rn{font-size:11px;display:block}
.rb .rd{font-size:9px;color:#333;display:block;margin-top:1px}
.rb.on .rd{color:#3a6657}
.ctrl{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.cr{display:flex;justify-content:space-between;font-size:10px;color:#444}
.cr span:last-child{color:#777}
input[type=range]{width:100%;height:20px;-webkit-appearance:none;appearance:none;background:transparent;outline:none;cursor:pointer;margin:2px 0}
input[type=range]::-webkit-slider-runnable-track{height:4px;background:#2a2a2a;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#7eb8a4;cursor:pointer;border:none;margin-top:-9px}
input[type=range]::-moz-range-track{height:4px;background:#2a2a2a;border-radius:2px}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#7eb8a4;cursor:pointer;border:none}
hr{border:none;border-top:1px solid #1a1a1a;flex-shrink:0}
.btn{width:100%;padding:8px;background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:10px;cursor:pointer;border-radius:2px;margin-bottom:4px;letter-spacing:.05em;text-align:left}
.btn:active{background:#1a1a1a}
.btn.rec{border-color:#7a2a2a;color:#7a2a2a}
.btn.rec.on{background:#7a2a2a;color:#fff;animation:blink 1s infinite}
.btn.mp4c{border-color:#2a5a7a;color:#2a5a7a}
.btn.mp4c.on{background:#2a5a7a;color:#fff;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
.swatches{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.sw.on{border-color:#fff}
#cyc-palette{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;min-height:24px}
.cyc-sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;position:relative;flex-shrink:0}
.cyc-sw .rm{display:none;position:absolute;top:-4px;right:-4px;width:12px;height:12px;background:#c0392b;border-radius:50%;font-size:8px;color:#fff;align-items:center;justify-content:center}
.cyc-sw:hover .rm,.cyc-sw:active .rm{display:flex}
.add-cyc{width:22px;height:22px;border-radius:50%;border:1px dashed #333;background:transparent;cursor:pointer;font-size:16px;color:#444;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#cyc-hue-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
#cyc-hue-preview{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:1px solid #333}
#layer-panel{display:flex;flex-direction:column;gap:4px}
.layer-row{background:#141414;border:1px solid #222;border-radius:3px;padding:6px 8px;cursor:grab;touch-action:none}
.layer-row.drag-over{border-color:#7eb8a4}
.layer-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.layer-badge{width:18px;height:18px;border-radius:3px;background:#222;border:1px solid #333;font-size:9px;color:#666;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.layer-name{font-size:10px;color:#888;flex:1}
.layer-vis{width:22px;height:22px;border:1px solid #333;background:transparent;cursor:pointer;border-radius:2px;font-size:10px;color:#555;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.layer-vis.on{border-color:#7eb8a4;color:#7eb8a4}
.layer-opacity-row{display:flex;align-items:center;gap:6px}
.layer-opacity-row span{font-size:9px;color:#444;min-width:26px;text-align:right}
#size-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center}
#size-modal.show{display:flex}
.mbox{background:#1a1a1a;border:1px solid #333;padding:18px;border-radius:4px;width:260px}
.mbox h3{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#555;margin-bottom:12px}
.mbox input[type=number]{width:100%;padding:8px;background:#111;border:1px solid #333;color:#ccc;font-family:'Courier New',monospace;font-size:13px;border-radius:2px;margin-bottom:7px}
.mbox input[type=number]:focus{outline:none;border-color:#7eb8a4}
.prow{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.preset{padding:5px 8px;background:transparent;border:1px solid #333;color:#555;font-family:'Courier New',monospace;font-size:9px;cursor:pointer;border-radius:2px}
.mact{display:flex;gap:7px;margin-top:3px}
.mact button{flex:1;padding:8px;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;border-radius:2px}
.mok{background:#7eb8a4;border:none;color:#0a1410}
.mcancel{background:transparent;border:1px solid #333;color:#555}
#canvas-wrap{flex:1;position:relative;overflow:hidden;touch-action:none;display:flex;align-items:center;justify-content:center;background:#111}
#c{touch-action:none;display:block;transform-origin:center center}
#info{position:absolute;bottom:8px;right:10px;font-size:9px;color:#2a2a2a;pointer-events:none}
#rotate-handle{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(15,15,15,0.85);border:1px solid #2a2a2a;border-radius:20px;padding:6px 12px;touch-action:none}
#rotate-handle span{font-size:9px;color:#444;letter-spacing:.1em;text-transform:uppercase}
#rotate-slider{width:120px;height:20px;-webkit-appearance:none;appearance:none;background:transparent;outline:none;cursor:pointer}
#rotate-slider::-webkit-slider-runnable-track{height:3px;background:#2a2a2a;border-radius:2px}
#rotate-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#7eb8a4;cursor:pointer;border:none;margin-top:-7.5px}
#rotate-slider::-moz-range-track{height:3px;background:#2a2a2a;border-radius:2px}
#rotate-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#7eb8a4;cursor:pointer;border:none}
#rot-val{font-size:9px;color:#555;min-width:30px;text-align:right}
#reset-rot{font-size:9px;color:#444;background:transparent;border:none;cursor:pointer;padding:0 2px}
#reset-rot:hover{color:#888}
</style>
</head>
<body>
<div id="sidebar">
  <div id="mode-toggle">
    <button class="mtab on" id="tab-classic">classic</button>
    <button class="mtab" id="tab-auto">automaton</button>
    <button class="mtab" id="tab-layers">layers</button>
  </div>
  <div id="sidebar-inner">
    <div id="panel-classic">
      <div>
        <div class="lbl">brush</div>
        <button class="rb on" data-brush="pen"><span class="rn">solid pen</span><span class="rd">hard edge, pressure = size</span></button>
        <button class="rb" data-brush="texture"><span class="rn">textured</span><span class="rd">rough bristly edge</span></button>
        <button class="rb" data-brush="marker"><span class="rn">flat marker</span><span class="rd">wide, transparent</span></button>
        <button class="rb" data-brush="cycle"><span class="rn">cycle pen</span><span class="rd">random colour each stroke</span></button>
        <button class="rb" data-brush="eraser"><span class="rn">eraser</span><span class="rd">clears all to black</span></button>
      </div>
      <hr>
      <div>
        <div class="lbl">colour</div>
        <div class="swatches" id="classic-swatches"></div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
          <input type="color" id="classic-color-pick" value="#e8c97a" style="width:24px;height:24px;border-radius:50%;border:1px solid #333;padding:0;cursor:pointer;background:none">
          <span style="font-size:9px;color:#444">custom</span>
        </div>
      </div>
      <hr>
      <div>
        <div class="lbl">cycle palette</div>
        <div id="cyc-palette"></div>
        <div id="cyc-hue-row">
          <input type="range" id="cyc-hue" min="0" max="360" value="200" step="1" style="flex:1">
          <div id="cyc-hue-preview"></div>
          <button class="add-cyc" id="cyc-add">+</button>
        </div>
      </div>
      <hr>
      <div>
        <div class="lbl">size + opacity</div>
        <div class="ctrl">
          <div class="cr"><span>size</span><span id="classic-size-val">12</span></div>
          <input type="range" id="classic-size" min="1" max="80" value="12" step="1">
        </div>
        <div class="ctrl">
          <div class="cr"><span>opacity</span><span id="classic-opacity-val">90</span></div>
          <input type="range" id="classic-opacity" min="5" max="100" value="90" step="1">
        </div>
      </div>
      <hr>
      <div>
        <div class="lbl">history</div>
        <button class="btn" id="undo-btn">undo (5 steps)</button>
      </div>
    </div>

    <div id="panel-auto" style="display:none">
      <div>
        <div class="lbl">rule</div>
        <button class="rb on" data-rule="crystal"><span class="rn">crystal</span><span class="rd">grows outward, stays</span></button>
        <button class="rb" data-rule="pulse"><span class="rn">pulse</span><span class="rd">waves radiate outward</span></button>
        <button class="rb" data-rule="coral"><span class="rn">coral</span><span class="rd">branches, seeks edges</span></button>
        <button class="rb" data-rule="infection"><span class="rn">infection</span><span class="rd">colours fight each other</span></button>
        <button class="rb" data-rule="noise"><span class="rn">noise field</span><span class="rd">marks drift + warp</span></button>
        <button class="rb" data-rule="static"><span class="rn">static</span><span class="rd">grain that organises</span></button>
      </div>
      <hr>
      <div>
        <div class="lbl">colour</div>
        <div class="swatches" id="auto-swatches"></div>
      </div>
      <hr>
      <div>
        <div class="lbl">seed</div>
        <div class="ctrl">
          <div class="cr"><span>density</span><span id="dv">60</span></div>
          <input type="range" id="density" min="10" max="100" value="60" step="1">
        </div>
        <div class="ctrl">
          <div class="cr"><span>speed</span><span id="sv">5</span></div>
          <input type="range" id="speed" min="1" max="10" value="5" step="1">
        </div>
        <div class="ctrl">
          <div class="cr"><span>hue drift</span><span id="hdv">30</span></div>
          <input type="range" id="hdrift" min="0" max="120" value="30" step="1">
        </div>
      </div>
      <hr>
      <div id="rule-params">
        <div class="lbl" id="rule-params-lbl">rule params</div>
        <div id="rule-params-inner"></div>
      </div>
    </div>

    <div id="panel-layers" style="display:none">
      <div class="lbl">drag to reorder</div>
      <div id="layer-panel"></div>
    </div>

    <hr>
    <div>
      <div class="lbl">canvas</div>
      <button class="btn" id="size-btn">set size</button>
      <button class="btn" id="clear-btn">clear all</button>
      <button class="btn" id="pause-btn">pause</button>
    </div>
    <hr>
    <div>
      <div class="lbl">export</div>
      <button class="btn rec" id="gif-btn">● gif</button>
      <button class="btn mp4c" id="mp4-btn">● mp4</button>
      <button class="btn" id="png-btn">png</button>
    </div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="rotate-handle">
    <span>rotate</span>
    <input type="range" id="rotate-slider" min="-180" max="180" value="0" step="1">
    <span id="rot-val">0°</span>
    <button id="reset-rot">↺</button>
  </div>
  <div id="info">seed paint</div>
</div>

<div id="size-modal">
  <div class="mbox">
    <h3>canvas size</h3>
    <div class="prow">
      <button class="preset" data-w="800" data-h="800">800²</button>
      <button class="preset" data-w="1080" data-h="1080">1080²</button>
      <button class="preset" data-w="1920" data-h="1080">1920×1080</button>
      <button class="preset" data-w="1080" data-h="1920">1080×1920</button>
      <button class="preset" data-w="2048" data-h="2048">2048²</button>
    </div>
    <input type="number" id="cw" placeholder="width px" value="1080">
    <input type="number" id="ch" placeholder="height px" value="1080">
    <div class="mact">
      <button class="mcancel" id="modal-cancel">cancel</button>
      <button class="mok" id="modal-ok">apply</button>
    </div>
  </div>
</div>


<div id="gif-settings-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:200;align-items:center;justify-content:center">
  <div style="background:#1a1a1a;border:1px solid #333;padding:20px;border-radius:4px;width:280px;font-family:'Courier New',monospace">
    <div style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#444;margin-bottom:14px">gif export settings</div>

    <div style="font-size:10px;color:#555;margin-bottom:4px">resolution</div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <button class="gs-res on" data-scale="1">full</button>
      <button class="gs-res" data-scale="0.75">75%</button>
      <button class="gs-res" data-scale="0.5">50%</button>
      <button class="gs-res" data-scale="0.25">25%</button>
    </div>

    <div style="font-size:10px;color:#555;margin-bottom:4px">duration (seconds)</div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <button class="gs-dur on" data-dur="2">2s</button>
      <button class="gs-dur" data-dur="3">3s</button>
      <button class="gs-dur" data-dur="5">5s</button>
      <button class="gs-dur" data-dur="8">8s</button>
      <button class="gs-dur" data-dur="12">12s</button>
    </div>

    <div style="font-size:10px;color:#555;margin-bottom:4px">fps</div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <button class="gs-fps" data-fps="12">12</button>
      <button class="gs-fps on" data-fps="15">15</button>
      <button class="gs-fps" data-fps="24">24</button>
    </div>

    <div style="font-size:10px;color:#555;margin-bottom:4px">aesthetic</div>
    <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
      <button class="gs-aes on" data-aes="smooth">smooth</button>
      <button class="gs-aes" data-aes="pixel">pixel</button>
      <button class="gs-aes" data-aes="dither">dither</button>
    </div>

    <div style="display:flex;gap:8px">
      <button id="gs-cancel" style="flex:1;padding:8px;background:transparent;border:1px solid #333;color:#555;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;border-radius:2px">cancel</button>
      <button id="gs-start" style="flex:1;padding:8px;background:#7a2a2a;border:none;color:#fff;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;border-radius:2px">start recording</button>
    </div>
    <div id="gs-info" style="font-size:9px;color:#444;margin-top:10px;text-align:center"></div>
  </div>
</div>
<script>
// ── HELPERS ───────────────────────────────────────────────────────
function hslToRgb(h,s,l){
  h=((h%360)+360)%360;s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1)};
  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}
function hslToHex(h,s,l){const[r,g,b]=hslToRgb(h,s,l);return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}

// ── LAYERS ────────────────────────────────────────────────────────
const LAYERS={
  bg:     {name:'background',canvas:document.createElement('canvas'),opacity:100,visible:true},
  classic:{name:'classic',   canvas:document.createElement('canvas'),opacity:100,visible:true},
  auto:   {name:'automaton', canvas:document.createElement('canvas'),opacity:100,visible:true},
  overlay:{name:'overlay',   canvas:document.createElement('canvas'),opacity:100,visible:true},
};
let layerOrder=['bg','classic','auto','overlay'];
function getCtx(id){return LAYERS[id].canvas.getContext('2d')}

const displayCanvas=document.getElementById('c');
const displayCtx=displayCanvas.getContext('2d');
const wrap=document.getElementById('canvas-wrap');
const CELL=4;
let CW=1080,CH=1080,COLS,ROWS;
let grid,nextGrid,hueGrid,nextHueGrid,ageGrid,ruleGrid,phaseGrid;
const RULE_NONE=0,RULE_CRYSTAL=1,RULE_PULSE=2,RULE_CORAL=3,RULE_INFECTION=4,RULE_NOISE=5,RULE_STATIC=6;
const RULE_IDS={crystal:RULE_CRYSTAL,pulse:RULE_PULSE,coral:RULE_CORAL,infection:RULE_INFECTION,noise:RULE_NOISE,static:RULE_STATIC};

function initAll(w,h){
  CW=w;CH=h;
  displayCanvas.width=CW;displayCanvas.height=CH;
  displayCanvas.style.maxWidth='100%';displayCanvas.style.maxHeight='100%';
  Object.values(LAYERS).forEach(l=>{l.canvas.width=CW;l.canvas.height=CH});
  getCtx('bg').fillStyle='#0a0a0a';getCtx('bg').fillRect(0,0,CW,CH);
  COLS=Math.ceil(CW/CELL);ROWS=Math.ceil(CH/CELL);
  const n=COLS*ROWS;
  grid=new Float32Array(n);nextGrid=new Float32Array(n);
  hueGrid=new Float32Array(n);nextHueGrid=new Float32Array(n);
  ageGrid=new Float32Array(n);ruleGrid=new Uint8Array(n);phaseGrid=new Float32Array(n);

}
initAll(1080,1080);

// ── CANVAS ROTATION ───────────────────────────────────────────────
let canvasRotation=0;
const rotSlider=document.getElementById('rotate-slider');
const rotVal=document.getElementById('rot-val');
rotSlider.addEventListener('input',()=>{
  canvasRotation=+rotSlider.value;
  rotVal.textContent=canvasRotation+'°';
  displayCanvas.style.transform=`rotate(${canvasRotation}deg)`;
});
rotSlider.addEventListener('change',()=>{
  canvasRotation=+rotSlider.value;
  rotVal.textContent=canvasRotation+'°';
  displayCanvas.style.transform=`rotate(${canvasRotation}deg)`;
});
document.getElementById('reset-rot').addEventListener('click',()=>{
  canvasRotation=0;rotSlider.value=0;rotVal.textContent='0°';
  displayCanvas.style.transform='rotate(0deg)';
});

// ── COMPOSITE ─────────────────────────────────────────────────────
function composite(){
  displayCtx.clearRect(0,0,CW,CH);
  for(const id of layerOrder){
    const l=LAYERS[id];if(!l.visible)continue;
    displayCtx.globalAlpha=l.opacity/100;
    displayCtx.drawImage(l.canvas,0,0);
  }
  displayCtx.globalAlpha=1;
}

// ── UNDO ─────────────────────────────────────────────────────────
// Snapshot classicCanvas before each stroke
let undoStack=[];
const MAX_UNDO=5;
function pushUndo(){
  const snap=document.createElement('canvas');snap.width=CW;snap.height=CH;
  snap.getContext('2d').drawImage(LAYERS.classic.canvas,0,0);
  undoStack.push(snap);
  if(undoStack.length>MAX_UNDO)undoStack.shift();
}
function undo(){
  if(!undoStack.length)return;
  const snap=undoStack.pop();
  const cc=getCtx('classic');
  cc.clearRect(0,0,CW,CH);cc.drawImage(snap,0,0);
}
document.getElementById('undo-btn').addEventListener('click',undo);

// ── LAYER PANEL ───────────────────────────────────────────────────
let dragSrc=null;
function buildLayerPanel(){
  const panel=document.getElementById('layer-panel');panel.innerHTML='';
  [...layerOrder].reverse().forEach(id=>{
    const l=LAYERS[id];const renderPos=layerOrder.indexOf(id)+1;
    const row=document.createElement('div');row.className='layer-row';row.dataset.id=id;
    const top=document.createElement('div');top.className='layer-top';
    const badge=document.createElement('div');badge.className='layer-badge';badge.textContent=renderPos;
    const name=document.createElement('div');name.className='layer-name';name.textContent=l.name;
    const vis=document.createElement('button');vis.className='layer-vis'+(l.visible?' on':'');vis.textContent=l.visible?'●':'○';
    vis.addEventListener('click',e=>{e.stopPropagation();l.visible=!l.visible;vis.className='layer-vis'+(l.visible?' on':'');vis.textContent=l.visible?'●':'○'});
    top.appendChild(badge);top.appendChild(name);top.appendChild(vis);
    const opRow=document.createElement('div');opRow.className='layer-opacity-row';

let currentBrush='pen',currentRule='crystal';
let density=60,simSpeed=5,hueDrift=30,classicSize=12,classicOpacity=90;

// ── RULE PARAMS ───────────────────────────────────────────────────
const ruleParams={
  crystal: {spreadChance:{label:'spread chance',min:1,max:100,val:35,scale:0.001}, neighbourMin:{label:'min neighbours',min:1,max:4,val:2,scale:1}, neighbourMax:{label:'max neighbours',min:2,max:8,val:5,scale:1}, gravityAngle:{label:'gravity angle °',min:0,max:360,val:270,scale:1}, gravityStrength:{label:'gravity strength',min:0,max:100,val:0,scale:0.01}},
  pulse:   {waveSpeed:{label:'wave speed',min:1,max:100,val:18,scale:0.01}, spreadChance:{label:'spread chance',min:1,max:100,val:6,scale:0.01}, spreadFreq:{label:'spread every N',min:1,max:16,val:4,scale:1}},
  coral:   {branchChance:{label:'branch chance',min:1,max:100,val:5,scale:0.01}},
  infection:{emptySpread:{label:'empty spread',min:1,max:100,val:18,scale:0.001}, fightChance:{label:'fight chance',min:1,max:100,val:14,scale:0.001}},
  noise:   {flowSpeed:{label:'flow speed',min:1,max:100,val:12,scale:0.001}, trailDecay:{label:'trail decay',min:1,max:100,val:4,scale:0.01}},
  static:  {flicker:{label:'flicker',min:0,max:100,val:25,scale:0.01}, spread:{label:'spread chance',min:1,max:100,val:12,scale:0.001}, consensus:{label:'hue consensus',min:1,max:100,val:5,scale:0.01}},
};
// helpers to get current param value scaled
function rp(rule,key){const p=ruleParams[rule];return p&&p[key]?p[key].val*p[key].scale:0}

function buildRuleParams(rule){
  const inner=document.getElementById('rule-params-inner');
  document.getElementById('rule-params-lbl').textContent=rule+' params';
  inner.innerHTML='';
  const params=ruleParams[rule];if(!params)return;
  Object.entries(params).forEach(([key,p])=>{
    const wrap=document.createElement('div');wrap.className='ctrl';
    const cr=document.createElement('div');cr.className='cr';
    const lbl=document.createElement('span');lbl.textContent=p.label;
    const val=document.createElement('span');val.textContent=p.val;val.id='rp-val-'+key;
    cr.appendChild(lbl);cr.appendChild(val);
    const sl=document.createElement('input');sl.type='range';sl.min=p.min;sl.max=p.max;sl.value=p.val;sl.step=1;
    const update=()=>{p.val=+sl.value;val.textContent=sl.value};
    sl.addEventListener('input',update);sl.addEventListener('change',update);
    wrap.appendChild(cr);wrap.appendChild(sl);inner.appendChild(wrap);
  });
}
let paused=false,drawing=false,lastPX=-1,lastPY=-1,pressure=0.5,noiseT=0;

// ── CLASSIC DRAWING ───────────────────────────────────────────────
function drawClassicPoint(x,y,p){
  const brush=currentBrush;
  const alpha=(classicOpacity/100)*(0.4+p*0.6);
  const size=classicSize*(0.5+p*0.5);
  const cc=getCtx('classic');
  if(brush==='eraser'){
    const r2=size*1.5;
    ['classic','auto','overlay'].forEach(id=>{
      const lc=getCtx(id);lc.save();lc.globalCompositeOperation='destination-out';
      lc.beginPath();lc.arc(x,y,r2,0,Math.PI*2);lc.fill();lc.restore();
    });
    const cx=Math.floor(x/CELL),cy=Math.floor(y/CELL),gr=Math.ceil(r2/CELL);
    for(let dy=-gr;dy<=gr;dy++)for(let dx=-gr;dx<=gr;dx++){
      const nx=cx+dx,ny=cy+dy;if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
      if(dx*dx+dy*dy<=gr*gr){const i=ny*COLS+nx;grid[i]=0;ruleGrid[i]=0}
    }
    return;
  }
  const col=brush==='cycle'?strokeCycColor:classicColor;
  cc.save();
  if(brush==='pen'){cc.globalAlpha=alpha;cc.fillStyle=col;cc.beginPath();cc.arc(x,y,size,0,Math.PI*2);cc.fill()}
  if(brush==='texture'){
    const count=Math.floor(8+p*14);
    for(let i=0;i<count;i++){
      const angle=Math.random()*Math.PI*2,dist=Math.random()*size*1.2;
      cc.globalAlpha=alpha*(0.3+Math.random()*0.7);cc.fillStyle=col;
      cc.beginPath();cc.arc(x+Math.cos(angle)*dist,y+Math.sin(angle)*dist,size*(0.12+Math.random()*0.2),0,Math.PI*2);cc.fill();
    }
    cc.globalAlpha=alpha*0.8;cc.fillStyle=col;cc.beginPath();cc.arc(x,y,size*0.4,0,Math.PI*2);cc.fill();
  }
  if(brush==='marker'){cc.globalAlpha=alpha*0.35;cc.fillStyle=col;cc.beginPath();cc.ellipse(x,y,size*2.2,size*0.7,Math.PI/6,0,Math.PI*2);cc.fill()}
  if(brush==='cycle'){cc.globalAlpha=alpha;cc.fillStyle=strokeCycColor;cc.beginPath();cc.arc(x,y,size,0,Math.PI*2);cc.fill()}
  cc.restore();
}

function interpolateClassic(x1,y1,x2,y2,p){
  const steps=Math.ceil(Math.hypot(x2-x1,y2-y1)/Math.max(1,classicSize*0.4));
  for(let i=1;i<=steps;i++)drawClassicPoint(x1+(x2-x1)*i/steps,y1+(y2-y1)*i/steps,p);
}

// ── AUTOMATON ─────────────────────────────────────────────────────
function idx(x,y){x=(x+COLS)%COLS;y=(y+ROWS)%ROWS;return y*COLS+x}
function seedAt(cx,cy,p){
  const r=Math.max(2,Math.floor((density/100)*8*p));
  const col=AUTO_PALETTE[autoActiveColor];const ruleId=RULE_IDS[currentRule]||RULE_CRYSTAL;
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    if(dx*dx+dy*dy>r*r)continue;
    const x=cx+dx,y=cy+dy;if(x<0||x>=COLS||y<0||y>=ROWS)continue;
    if(Math.random()<(density/100)*p){
      const i=idx(x,y);grid[i]=0.8+Math.random()*0.2;ageGrid[i]=0;
      hueGrid[i]=col.h+(Math.random()-0.5)*hueDrift;ruleGrid[i]=ruleId;phaseGrid[i]=0;
    }
  }
}
function smoothNoise(x,y,t){return Math.sin(x*0.08+t*0.7)*Math.cos(y*0.06+t*0.5)+Math.sin(x*0.03-y*0.04+t*0.3)*0.5}

function step(){
  nextGrid.set(grid);nextHueGrid.set(hueGrid);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const i=idx(x,y);const v=grid[i];const rule=ruleGrid[i];
    if(rule===RULE_CRYSTAL){
      ageGrid[i]++;nextGrid[i]=v;
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        if(!dx&&!dy)continue;const nx=x+dx,ny=y+dy;if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
        const ni=idx(nx,ny);
        if(grid[ni]<0.15&&Math.random()<rp("crystal","spreadChance")){
          let nc=0;for(let dy2=-1;dy2<=1;dy2++)for(let dx2=-1;dx2<=1;dx2++){if(!dx2&&!dy2)continue;if(grid[idx(nx+dx2,ny+dy2)]>0.15)nc++}
          if(nc>=rp("crystal","neighbourMin")&&nc<=rp("crystal","neighbourMax")){
            // gravity bias — direction toward gravity angle gets higher chance
            const gStr=rp("crystal","gravityStrength");
            if(gStr>0){
              const gAng=rp("crystal","gravityAngle")*Math.PI/180;
              const gx=Math.cos(gAng),gy=Math.sin(gAng);
              const dot=(dx*gx+dy*gy); // -1 to 1
              const bias=1+dot*gStr*2;
              if(Math.random()>bias*0.5+0.1)continue; // skip if against gravity
            }
            nextGrid[ni]=v*(0.88+Math.random()*0.12);nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*8;ruleGrid[ni]=RULE_CRYSTAL;ageGrid[ni]=0;
          }
        }
      }
      continue;
    }
    if(rule===RULE_PULSE){
      ageGrid[i]++;phaseGrid[i]+=rp("pulse","waveSpeed");nextGrid[i]=0.25+(Math.sin(phaseGrid[i])*.5+.5)*0.75;
      if(ageGrid[i]%Math.max(1,Math.round(rp("pulse","spreadFreq")))===0&&Math.random()<rp("pulse","spreadChance")){
        for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
          if(!dx&&!dy)continue;const nx=x+dx,ny=y+dy;if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
          const ni=idx(nx,ny);
          if(grid[ni]<0.1){nextGrid[ni]=0.6+Math.random()*0.3;nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*15;ruleGrid[ni]=RULE_PULSE;phaseGrid[ni]=phaseGrid[i]+Math.PI*(0.8+Math.random()*0.4);ageGrid[ni]=0}
        }
      }
      continue;
    }
    if(rule===RULE_CORAL){
      ageGrid[i]++;nextGrid[i]=v;
      for(const[dx,dy]of[[0,-1],[1,0],[0,1],[-1,0]]){
        const nx=x+dx,ny=y+dy;if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
        const ni=idx(nx,ny);if(grid[ni]>0.1)continue;
        let liveN=0;for(const[dx2,dy2]of[[0,-1],[1,0],[0,1],[-1,0]])if(grid[idx(nx+dx2,ny+dy2)]>0.1)liveN++;
        let dc=0;for(const[dx2,dy2]of[[-1,-1],[1,-1],[-1,1],[1,1]])if(grid[idx(nx+dx2,ny+dy2)]>0.1)dc++;
        if(liveN===1&&dc===0&&Math.random()<rp("coral","branchChance")){nextGrid[ni]=v*(0.88+Math.random()*0.12);nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*12;ruleGrid[ni]=RULE_CORAL;ageGrid[ni]=0}
      }
      continue;
    }
    if(rule===RULE_INFECTION){
      ageGrid[i]++;nextGrid[i]=v;
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        if(!dx&&!dy)continue;const nx=x+dx,ny=y+dy;if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
        const ni=idx(nx,ny);const nv=grid[ni];
        if(nv<0.05){if(Math.random()<rp("infection","emptySpread")){nextGrid[ni]=v*0.85;nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*8;ruleGrid[ni]=RULE_INFECTION;ageGrid[ni]=0}}
        else{const hd=Math.abs(hueGrid[ni]-hueGrid[i]);if(Math.min(hd,360-hd)>35&&Math.random()<rp("infection","fightChance")&&v>=nv){nextGrid[ni]=v*0.9;nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*10;ruleGrid[ni]=RULE_INFECTION;ageGrid[ni]=0}}
      }
      continue;
    }
    if(rule===RULE_NOISE&&v>0.01){
      ageGrid[i]++;
      const angle=(smoothNoise(x,y,noiseT)+1)*Math.PI;
      const tx=Math.round(x+Math.cos(angle)*0.9),ty=Math.round(y+Math.sin(angle)*0.9);
      if(tx>=0&&tx<COLS&&ty>=0&&ty<ROWS){const ti=idx(tx,ty);nextGrid[ti]=Math.min(1,v*0.992+nextGrid[ti]);nextHueGrid[ti]=hueGrid[i]+(Math.random()-0.5)*3;ruleGrid[ti]=RULE_NOISE;ageGrid[ti]=ageGrid[i]+1}
      const decay=rp("noise","trailDecay");nextGrid[i]=Math.max(0,v-decay);if(nextGrid[i]<decay)ruleGrid[i]=RULE_NONE;
      continue;
    }
    if(rule===RULE_STATIC){
      ageGrid[i]++;nextGrid[i]=v;
      let hsum=0,hcount=0;
      for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){if(!dx&&!dy)continue;const ni=idx(x+dx,y+dy);if(grid[ni]>0.05){hsum+=hueGrid[ni];hcount++}}
      if(hcount>0)nextHueGrid[i]=hueGrid[i]+(hsum/hcount-hueGrid[i])*rp("static","consensus");
      if(Math.random()<rp("static","flicker"))nextGrid[i]=Math.max(0.15,Math.min(1,v+(Math.random()-0.5)*0.12));
      if(v>0.3&&Math.random()<rp("static","spread")){const dx=Math.floor(Math.random()*3)-1,dy=Math.floor(Math.random()*3)-1;const ni=idx(x+dx,y+dy);if(grid[ni]<0.08){nextGrid[ni]=v*(0.5+Math.random()*0.3);nextHueGrid[ni]=hueGrid[i]+(Math.random()-0.5)*hueDrift;ruleGrid[ni]=RULE_STATIC;ageGrid[ni]=0}}
      continue;
    }
  }
  noiseT+=rp("noise","flowSpeed");grid.set(nextGrid);hueGrid.set(nextHueGrid);
}

function renderAutoToLayer(){
  const ac=getCtx('auto');
  const imgData=ac.createImageData(CW,CH);const data=imgData.data;
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const i=idx(x,y);const v=grid[i];if(v<0.02)continue;
    const rule=ruleGrid[i];let s=60+v*25,l=20+v*52;
    if(rule===RULE_PULSE){s=70;l=15+v*65}if(rule===RULE_STATIC){s=45+v*20;l=18+v*40}
    const[r,g,b]=hslToRgb(hueGrid[i],s,l);const alpha=Math.min(255,Math.floor(v*255));
    for(let py=0;py<CELL;py++)for(let px2=0;px2<CELL;px2++){
      const px3=x*CELL+px2,py3=y*CELL+py;if(px3>=CW||py3>=CH)continue;
      const pi=(py3*CW+px3)*4;data[pi]=r;data[pi+1]=g;data[pi+2]=b;data[pi+3]=alpha;
    }
  }
  ac.clearRect(0,0,CW,CH);ac.putImageData(imgData,0,0);
}

// ── LOOP ──────────────────────────────────────────────────────────
let stepAccum=0,lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(50,ts-lastTime);lastTime=ts;
  if(!paused){
    stepAccum+=dt;const interval=1000/(simSpeed*8);
    while(stepAccum>interval){step();stepAccum-=interval}
    renderAutoToLayer();
  }
  composite();
  if(gifRecording)captureGifFrame(dt);
}
requestAnimationFrame(loop);

// ── INPUT — account for canvas rotation ──────────────────────────
function clientToCanvas(cx,cy){
  const rect=displayCanvas.getBoundingClientRect();
  // scale: canvas logical px vs displayed px
  const scaleX=CW/rect.width, scaleY=CH/rect.height;
  // point relative to visual centre of displayed canvas
  const vcx=rect.left+rect.width/2, vcy=rect.top+rect.height/2;
  const dx=cx-vcx, dy=cy-vcy;
  // un-rotate (display rotation)
  const rad=-canvasRotation*Math.PI/180;
  const ux=dx*Math.cos(rad)-dy*Math.sin(rad);
  const uy=dx*Math.sin(rad)+dy*Math.cos(rad);
  // apply scale and offset to canvas coords
  return[ux*scaleX+CW/2, uy*scaleY+CH/2];
}
function getCell(px,py){return[Math.floor(px/CELL),Math.floor(py/CELL)]}
let lastCX=-1,lastCY=-1;

displayCanvas.addEventListener('pointerdown',e=>{
  e.preventDefault();displayCanvas.setPointerCapture(e.pointerId);
  drawing=true;pressure=e.pressure>0?e.pressure:0.5;
  const[px,py]=clientToCanvas(e.clientX,e.clientY);lastPX=px;lastPY=py;
  if(mode==='classic'||mode==='layers'){
    if(currentBrush==='cycle')strokeCycColor=pickCycColor();
    if(currentBrush!=='eraser')pushUndo();
    drawClassicPoint(px,py,pressure);
  } else {
    const[cx,cy]=getCell(px,py);lastCX=cx;lastCY=cy;seedAt(cx,cy,pressure);
  }
},{passive:false});

displayCanvas.addEventListener('pointermove',e=>{
  e.preventDefault();if(!drawing)return;
  pressure=e.pressure>0?e.pressure:pressure;
  const[px,py]=clientToCanvas(e.clientX,e.clientY);
  if(mode==='classic'||mode==='layers'){
    interpolateClassic(lastPX,lastPY,px,py,pressure);
  } else {
    const[cx,cy]=getCell(px,py);const[lcx,lcy]=getCell(lastPX,lastPY);
    if(cx!==lcx||cy!==lcy){
      const steps=Math.max(1,Math.ceil(Math.hypot(cx-lcx,cy-lcy)));
      for(let i=0;i<=steps;i++)seedAt(Math.round(lcx+(cx-lcx)*i/steps),Math.round(lcy+(cy-lcy)*i/steps),pressure*0.7);
    }
  }
  lastPX=px;lastPY=py;
},{passive:false});

displayCanvas.addEventListener('pointerup',e=>{e.preventDefault();drawing=false},{passive:false});
displayCanvas.addEventListener('pointercancel',()=>{drawing=false});
document.addEventListener('touchmove',e=>{if(e.target===displayCanvas)e.preventDefault()},{passive:false});

// ── EXPORT — render at current rotation into a snapshot canvas ────
function getRotatedSnapshot(){
  // render the full composited image rotated into a new canvas
  const angle=canvasRotation*Math.PI/180;
  const cos=Math.abs(Math.cos(angle)),sin=Math.abs(Math.sin(angle));
  const W2=Math.round(CW*cos+CH*sin);
  const H2=Math.round(CW*sin+CH*cos);
  const snap=document.createElement('canvas');snap.width=W2;snap.height=H2;
  const sc=snap.getContext('2d');
  sc.fillStyle='#0a0a0a';sc.fillRect(0,0,W2,H2);
  sc.save();sc.translate(W2/2,H2/2);sc.rotate(angle);sc.drawImage(displayCanvas,-CW/2,-CH/2);sc.restore();
  return snap;
}

// ── MEDIAN CUT QUANTIZER ─────────────────────────────────────────
function medianCutQuantize(rgba,w,h,numColors){
  const pixels=[];
  for(let i=0;i<w*h;i++){if(rgba[i*4+3]<10)continue;pixels.push([rgba[i*4],rgba[i*4+1],rgba[i*4+2]])}
  if(!pixels.length)return{palette:Array(numColors).fill([0,0,0]),indices:new Uint8Array(w*h)};
  function cut(bucket){
    let rMin=255,rMax=0,gMin=255,gMax=0,bMin=255,bMax=0;
    for(const[r,g,b]of bucket){if(r<rMin)rMin=r;if(r>rMax)rMax=r;if(g<gMin)gMin=g;if(g>gMax)gMax=g;if(b<bMin)bMin=b;if(b>bMax)bMax=b}
    const rR=rMax-rMin,gR=gMax-gMin,bR=bMax-bMin;
    let ch=0;if(gR>=rR&&gR>=bR)ch=1;else if(bR>=rR&&bR>=gR)ch=2;
    bucket.sort((a,b2)=>a[ch]-b2[ch]);
    const mid=Math.floor(bucket.length/2);
    return[bucket.slice(0,mid),bucket.slice(mid)];
  }
  let buckets=[pixels];
  while(buckets.length<numColors){
    let li=0;for(let i=1;i<buckets.length;i++)if(buckets[i].length>buckets[li].length)li=i;
    if(buckets[li].length<2)break;
    const[a,b]=cut(buckets[li]);buckets.splice(li,1,a,b);
  }
  const palette=buckets.map(bk=>{
    let r=0,g=0,bl=0;for(const[pr,pg,pb]of bk){r+=pr;g+=pg;bl+=pb}
    const n=bk.length;return[Math.round(r/n),Math.round(g/n),Math.round(bl/n)];
  });
  while(palette.length<numColors)palette.push([0,0,0]);
  const indices=new Uint8Array(w*h);
  for(let i=0;i<w*h;i++){
    const r=rgba[i*4],g=rgba[i*4+1],b=rgba[i*4+2];
    let best=0,bd=Infinity;
    for(let p=0;p<palette.length;p++){const dr=r-palette[p][0],dg=g-palette[p][1],db=b-palette[p][2];const d=dr*dr+dg*dg+db*db;if(d<bd){bd=d;best=p}}
    indices[i]=best;
  }
  return{palette,indices};
}

// ── STREAMING GIF ENCODER ────────────────────────────────────────
function makeGifEncoder(w,h,delayCs){
  const bytes=[];
  const wb=b=>bytes.push(b&0xff);
  const ws=s=>{for(let i=0;i<s.length;i++)wb(s.charCodeAt(i))};
  const ww=n=>{wb(n&0xff);wb((n>>8)&0xff)};
  let hw=false;
  function lzw(idx){
    const clr=256,eoi=257;const tbl=new Map();let cs=9,nxt=258;
    const out=[];let buf=0,bits=0;
    function em(code){buf|=code<<bits;bits+=cs;while(bits>=8){out.push(buf&0xff);buf>>=8;bits-=8}}
    em(clr);let str=null;
    for(let i=0;i<idx.length;i++){
      const cc=idx[i];if(str===null){str=cc;continue}
      const key=str+','+cc;
      if(tbl.has(key)){str=tbl.get(key)}
      else{em(str);if(nxt<4096){tbl.set(key,nxt++);if(nxt>(1<<cs)&&cs<12)cs++}else{em(clr);tbl.clear();cs=9;nxt=258}str=cc}
    }
    if(str!==null)em(str);em(eoi);if(bits>0)out.push(buf&0xff);
    return new Uint8Array(out);
  }
  return{
    addFrame(rgba){
      const{palette,indices}=medianCutQuantize(rgba,w,h,256);
      if(!hw){
        ws('GIF89a');ww(w);ww(h);wb(0xF7);wb(0);wb(0);
        for(const[r,g,b]of palette){wb(r);wb(g);wb(b)}
        ws('\x21\xFF\x0B');ws('NETSCAPE2.0');wb(3);wb(1);ww(0);wb(0);
        hw=true;
      }
      ws('\x21\xF9\x04');wb(0);ww(delayCs);wb(0);wb(0);
      wb(0x2C);ww(0);ww(0);ww(w);ww(h);wb(0x87);
      for(const[r,g,b]of palette){wb(r);wb(g);wb(b)}
      wb(8);
      const enc=lzw(indices);let off=0;
      while(off<enc.length){const len=Math.min(255,enc.length-off);wb(len);for(let i=0;i<len;i++)wb(enc[off+i]);off+=len}
      wb(0);
    },
    finish(){wb(0x3B);return new Uint8Array(bytes)}
  };
}

function applyAesthetic(src,w,h,aes){
  if(aes==='smooth'||aes==='pixel')return src;
  if(aes==='dither'){
    const d=new Uint8ClampedArray(src);
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const qr=Math.round(d[i]/85)*85,qg=Math.round(d[i+1]/85)*85,qb=Math.round(d[i+2]/85)*85;
      const er=d[i]-qr,eg=d[i+1]-qg,eb=d[i+2]-qb;
      d[i]=qr;d[i+1]=qg;d[i+2]=qb;
      for(const[ddx,ddy,wt]of[[1,0,7/16],[-1,1,3/16],[0,1,5/16],[1,1,1/16]]){
        const nx=x+ddx,ny=y+ddy;if(nx<0||nx>=w||ny>=h)continue;
        const ni=(ny*w+nx)*4;
        d[ni]=Math.min(255,Math.max(0,d[ni]+er*wt));
        d[ni+1]=Math.min(255,Math.max(0,d[ni+1]+eg*wt));
        d[ni+2]=Math.min(255,Math.max(0,d[ni+2]+eb*wt));
      }
    }
    return d;
  }
  return src;
}

// ── GIF RECORDING ────────────────────────────────────────────────
let gifRecording=false,gifEncoder=null,gifCaptured=0,gifTotalFrames=0;
let gifFrameInterval=0,gifTimer=0,gifW=0,gifH=0,gifAes='smooth';
const gifBtn=document.getElementById('gif-btn');

function startGifRecording(){
  const{scale,dur,fps,aes}=gifSettings;
  const snap=getRotatedSnapshot();
  gifW=Math.max(1,Math.round(snap.width*scale));
  gifH=Math.max(1,Math.round(snap.height*scale));
  gifFrameInterval=1000/fps;
  gifTotalFrames=Math.round(dur*fps);
  gifCaptured=0;gifTimer=gifFrameInterval;gifAes=aes;
  gifEncoder=makeGifEncoder(gifW,gifH,Math.max(1,Math.round(100/fps)));
  gifRecording=true;
  gifBtn.textContent='\u25a0 0/'+gifTotalFrames;
  gifBtn.classList.add('on');
}

function captureGifFrame(dt){
  gifTimer+=dt;
  while(gifTimer>=gifFrameInterval&&gifRecording){
    gifTimer-=gifFrameInterval;
    const snap=getRotatedSnapshot();
    const off=document.createElement('canvas');off.width=gifW;off.height=gifH;
    const oc=off.getContext('2d');
    if(gifAes==='pixel')oc.imageSmoothingEnabled=false;
    oc.drawImage(snap,0,0,gifW,gifH);
    const id=oc.getImageData(0,0,gifW,gifH);
    try{gifEncoder.addFrame(applyAesthetic(id.data,gifW,gifH,gifAes))}catch(e){console.error(e)}
    gifCaptured++;
    gifBtn.textContent='\u25a0 '+gifCaptured+'/'+gifTotalFrames;
    if(gifCaptured>=gifTotalFrames){gifRecording=false;saveGif();return}
  }
}

function saveGif(){
  gifBtn.textContent='saving...';gifBtn.disabled=true;
  setTimeout(()=>{
    try{
      const bytes=gifEncoder.finish();
      const blob=new Blob([bytes],{type:'image/gif'});
      const a=document.createElement('a');a.download='seed-paint-'+Date.now()+'.gif';a.href=URL.createObjectURL(blob);a.click();
    }catch(e){alert('gif failed: '+e.message)}
    gifBtn.textContent='\u25cf gif';gifBtn.disabled=false;
  },80);
}

gifBtn.addEventListener('click',()=>{
  if(gifRecording){gifRecording=false;if(gifCaptured>=3)saveGif();else gifBtn.textContent='\u25cf gif';}
  else{updateGsInfo();if(gifSettingsModal)gifSettingsModal.style.display='flex';}
});

// ── MP4 RECORDING ────────────────────────────────────────────────
let mp4Recording=false,mediaRecorder=null,mp4Chunks=[];
let mp4RecCanvas=null,mp4RecCtx=null,mp4AnimId=null;
const mp4Btn=document.getElementById('mp4-btn');

function mp4Loop(){
  if(!mp4Recording)return;
  mp4RecCtx.drawImage(getRotatedSnapshot(),0,0,mp4RecCanvas.width,mp4RecCanvas.height);
  mp4AnimId=requestAnimationFrame(mp4Loop);
}

mp4Btn.addEventListener('click',()=>{
  if(!mp4Recording){
    const snap=getRotatedSnapshot();
    mp4RecCanvas=document.createElement('canvas');
    mp4RecCanvas.width=snap.width;mp4RecCanvas.height=snap.height;
    mp4RecCtx=mp4RecCanvas.getContext('2d');
    mp4RecCtx.drawImage(snap,0,0);
    const stream=mp4RecCanvas.captureStream(30);
    const mime=['video/mp4;codecs=avc1','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    try{mediaRecorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:12000000})}
    catch(e){mediaRecorder=new MediaRecorder(stream,{videoBitsPerSecond:12000000})}
    mp4Chunks=[];
    mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size>0)mp4Chunks.push(e.data)};
    mediaRecorder.onstop=()=>{
      mp4Recording=false;cancelAnimationFrame(mp4AnimId);
      const m=mediaRecorder.mimeType||'video/webm';
      const blob=new Blob(mp4Chunks,{type:m});
      const a=document.createElement('a');a.download='seed-paint-'+Date.now()+'.'+(m.includes('mp4')?'mp4':'webm');a.href=URL.createObjectURL(blob);a.click();
      mp4Btn.textContent='\u25cf mp4';mp4Btn.classList.remove('on');
      mp4RecCanvas=null;mp4RecCtx=null;
    };
    mediaRecorder.start(100);mp4Recording=true;
    mp4AnimId=requestAnimationFrame(mp4Loop);
    mp4Btn.textContent='\u25a0 stop mp4';mp4Btn.classList.add('on');
  } else {
    mp4Recording=false;cancelAnimationFrame(mp4AnimId);mediaRecorder.stop();
  }
});

document.getElementById('info').textContent=CW+'\u00d7'+CH;
